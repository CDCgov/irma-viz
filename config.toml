# TODO: Docs
[targets]
list = ["A_PA"]

[plot_toggles]
read_percentages = true
clustermap = true
heuristics = true
coverage = true

[input]
data_path = "test_data/"
matrix_path = "test_data/"

[output]
path = "out/"

[constants]
# These are constants that affect the ranges of the heuristic plots. They are overridden in the configs for each IRMA module
min_aq = 24     # minimum average variant quality, does not apply to deletions
min_f = 0.008   # minimum frequency for single nucleotide variants
min_tcc = 100   # minimum non-ambiguous column coverage
min_conf = 0.80 # minimum confidence not machine error

# TODO: Make default color themes colorblind friendly/compliant
[density_average]
color = "#1f77b4"
stroke_width = 2.0
title = "Density of average allele quality"
xlabel = "Allele quality"
ylabel = "Density"
filename = "allele_quality_density"

[density_subplot]
color = "#1f77b4"
stroke_width = 2.0
title = "Density of average allele quality to {}"
xlabel = "Allele quality"
ylabel = "Density" 

[density_observed]
color = "#1f77b4"
stroke_width = 2.0
title = "Density of average allele quality to {}"
xlabel = "Observed frequency"
ylabel = "Density" 

[observed_subplot]
color = "#1f77b4"
stroke_width = 2.0
title = "Density of average allele quality to _"
xlabel = "Observed frequency"
ylabel = "Density" 

[coverage_histogram]
bins = 50   # from IRMA `heuristicDiagram.R`

[confidence_histogram]
bins = 50