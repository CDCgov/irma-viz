# TODO: Docs
[plots]
density_average = true
density_8 = true
density_observed = true
observed_8 = false
coverage = false
confidence = false
sankey_path = "test_data/READ_COUNTS.txt"
coverage_path = "test_data/A_PA-coverage.txt"
heuristics_path = "test_data/A_PA-allAlleles.txt"
variants_path = "test_data/A_PA-variants.txt"
pairing_stats_path = "test_data/A_PA-pairingStats.txt"

[output]
path = "out/"
width = 1200
height = 800

[constants]
min_aq = 30
min_f = 5
min_tcc = 6  
min_conf = 7

# TODO: Make default color themes colorblind friendly/compliant
[density_average]
color = "#1f77b4"
stroke_width = 2.0
title = "Density of average allele quality"
xlabel = "Allele quality"
ylabel = "Density"

[density_8]
color = "#1f77b4"
stroke_width = 2.0
title = "Density of average allele quality to 8"
xlabel = "Allele quality"
ylabel = "Density" 

[density_observed]
color = "#1f77b4"
stroke_width = 2.0
title = "Density of average allele quality to 100%"
xlabel = "Observed frequency"
ylabel = "Density" 

[observed_8]
color = "#1f77b4"
stroke_width = 2.0
title = "Density of average allele quality to 100%"
xlabel = "Observed frequency"
ylabel = "Density" 