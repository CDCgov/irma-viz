 (R1 &amp; R2)</text><text x="59" y="87.10000000000001" font-size="12" text-anchor="start">-<tspan font-weight="bold"> ASSEMBLED</tspan> : influenza reads in final assemblies.</text><text x="59" y="105.7" font-size="12" text-anchor="start">-<tspan font-weight="bold"> QC FILTERED</tspan> : didn&apos;t pass length/median quality thresholds.</text><text x="59" y="124.3" font-size="12" text-anchor="start">-<tspan font-weight="bold"> OTHER</tspan> : non-flu and contaminant/poor flu signal.</text><text x="59" y="152.20000000000002" font-size="14" text-anchor="start" font-weight="bold">2. Percentages of all read patterns passing QC process</text><text x="59" y="178.24" font-size="12" text-anchor="start">- Patterns are clustered or non-redundant reads.</text><text x="59" y="196.84" font-size="12" text-anchor="start">-<tspan font-weight="bold"> ASSEMBLED</tspan> : excellent influenza read patterns.</text><text x="59" y="215.44" font-size="12" text-anchor="start">-<tspan font-weight="bold"> UNUSABLE</tspan> : poor or contaminant flu patterns.</text><text x="59" y="234.04" font-size="12" text-anchor="start">-<tspan font-weight="bold"> CHIMERIC</tspan> : flu patterns matching both strands.</text><text x="59" y="252.64000000000001" font-size="12" text-anchor="start">-<tspan font-weight="bold"> NO MATCH</tspan> : non-flu read patterns.</text><text x="59" y="280.54" font-size="14" text-anchor="start" font-weight="bold">3. Percentages of assembled, merged-pair read counts</text><text x="59" y="306.58" font-size="12" text-anchor="start">- Shows the proportion of gene segments to the genome.</text><text x="59" y="325.18" font-size="12" text-anchor="start">- Paired-end reads have been merged into a single count</text><text x="59" y="343.78000000000003" font-size="12" text-anchor="start">unless not applicable: single-end reads have been used.</text></g></svg>